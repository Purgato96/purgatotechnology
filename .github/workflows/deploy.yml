name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ~/purgatotechnology

            git pull origin main

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            docker exec purgatotechnology_backend php artisan migrate --force

            docker exec purgatotechnology_backend php artisan config:cache
            docker exec purgatotechnology_backend php artisan route:cache
            docker exec purgatotechnology_backend php artisan view:cache
            docker exec purgatotechnology_backend php artisan event:cache

            docker image prune -f

            echo "Deploy concluido com sucesso!"
